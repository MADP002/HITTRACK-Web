<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HitTrack – Be an Inspiration</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Background decorative arrows -->
  <div class="bg-decor">
    <div class="arrows arrows-top-left">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="arrows arrows-top-right">
      <span></span><span></span>
      <span></span><span></span>
      <span></span>
    </div>
    <div class="arrows arrows-bottom-right">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Top black bar -->
  <div class="topbar"></div>

  <!-- Main layout -->
  <main class="layout">

    <!-- Login Card -->
    <section class="card" id="loginCard">
      <form class="form" id="loginForm" novalidate>
        <div class="input-group">
          <input type="text" id="emailInput" placeholder="Email / Username" autocomplete="username" required />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
        </div>

        <div class="input-group">
          <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" required />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
        </div>

        <div class="input-group">
          <input type="password" id="confirmPasswordInput" placeholder="Confirm Password" autocomplete="new-password" required />
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button type="submit" class="btn btn-login" id="signupBtn">
          <span class="btn-text">Signup</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>

        <a href="index.html" class="btn btn-signup">Login</a>

        <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>
      </form>
    </section>

    <!-- Brand Side -->
    <section class="brand">
      <h1 class="brand-name">
        <span class="brand-hit">HIT</span><span class="brand-track">TRACK</span>
      </h1>
      <p class="brand-tagline">Be an Inspiration</p>
    </section>

  </main>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">&#10005;</button>
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send you a reset link.</p>
      <div class="input-group">
        <input type="email" id="resetEmail" placeholder="Email address" />
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
      </div>
      <button class="btn btn-login" id="sendResetBtn">Send Reset Link</button>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
